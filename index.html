      /* --- GLOBAL THEMING VARIABLES --- */
      :root {
        /* Default Theme (Cyber/Cool Blue) */
        --bg-body: #141b29;
        --bg-card: #1f2937; /* Lighter than body */
        --color-primary-from: #00A7F8;
        --color-primary-to: #00FFB0;
        --color-accent: #00A7F8;
        --color-accent-hover: #00FFB0;

      }

      /* Ramadan Theme (Golden/Warm) */
      body.theme-ramadan {
        --bg-body: #000000; 
        --bg-card: #121212; /* Very dark grey */
        --color-primary-from: #D4AF37; 
        --color-primary-to: #F59E0B;   
        --color-accent: #FFD700;       
        --color-accent-hover: #FDB931;
        --shadow-color: rgba(212, 175, 55, 0.4);
        --color-text-on-primary: #000000;
      }

      /* Eid Theme (Celebration - Purple/Silver) */
      body.theme-eid {
        --bg-body: #141b29; 
        --bg-card: #1f2937;
        --color-primary-from: #6A0DAD; /* Royal Purple */
        --color-primary-to: #C0C0C0;   /* Silver */
        --color-accent: #9d4edd;       /* Light Purple */
        --color-accent-hover: #e0aaff;
        --shadow-color: rgba(106, 13, 173, 0.4);
        --color-text-on-primary: #ffffff; /* White text on purple gradient */
      }

      /* iOS Theme (Glassmorphism/Cyan/Clean) */
      body.theme-ios {
        --bg-body: #000000; /* Deep Dark Background */
        --bg-card: #1c1c1e; /* iOS System Gray 6 */
        --color-primary-from: #00C6FF; /* Cyan */
        --color-primary-to: #0072FF;   /* iOS Blue */
        --color-accent: #00C6FF;
        --color-accent-hover: #0072FF;
        --shadow-color: rgba(0, 198, 255, 0.4);
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.15);
        --border-radius-std: 1.5rem; /* 24px for softer iOS look */
        --color-text-on-primary: #ffffff;
      }

      /* Night City Theme (Cyberpunk/Neon) */
      body.theme-night-city {
        --bg-body: #050505; /* Pure Black */
        --bg-card: #0f0f0f;
        --color-primary-from: #FF00FF; /* Neon Magenta */
        --color-primary-to: #00FFFF;   /* Neon Cyan */
        --color-accent: #00FFFF;       /* Electric Blue */
        --color-accent-hover: #FF1493; /* Hot Pink */
        --shadow-color: rgba(0, 255, 255, 0.7);
        --border-radius-std: 0.25rem; /* Sharp edges */
        --color-text-on-primary: #000000;
      }

      /* Serene Nature Theme (Forest/Earth) */
      body.theme-nature {
        --bg-body: #1a2f2f; /* Deep Forest Green */
        --bg-card: #233e3e;
        --color-primary-from: #8FBC8F; /* Dark Sea Green */
        --color-primary-to: #B8860B;   /* Dark Goldenrod */
        --color-accent: #F5DEB3;       /* Wheat */
        --color-accent-hover: #DEB887; /* Burlywood */
        --color-text-primary: #F5F5DC; /* Beige */
        --shadow-color: rgba(143, 188, 143, 0.3);
        --border-radius-std: 1rem; /* Soft organic edges */
        --color-text-on-primary: #ffffff;
      }

      /* Cosmic Teal Theme (Refined & Unified) */
      body.theme-cosmic-teal {
        --bg-body: #0b1116; /* Exact Dark Color */
        --bg-card: #161b22; /* Slightly lighter teal-black */
        /* Vertical Gradient Colors for UI Elements: Lighter Top -> Darker Bottom */
        --color-primary-from: #2DD4BF; /* Bright Teal */
        --color-primary-to: #0F766E;   /* Deep Teal */
        --color-accent: #2DD4BF;       /* Matching Accent */
        --color-accent-hover: #14B8A6;
        --shadow-color: rgba(45, 212, 191, 0.3);
        --border-radius-std: 0.75rem;
        --color-text-on-primary: #000000;

        background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2011&auto=format&fit=crop');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
      }
      
      /* Overlay for Cosmic Teal - Unified & Shifted Down */
      body.theme-cosmic-teal::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Modified Vertical Gradient: 
           Starts semi-transparent at top to show stars,

        background: linear-gradient(

            rgba(11, 17, 22, 0.85) 0%,

        border-radius: var(--border-radius-std);
      }

      /* iOS Selection Button Logic */
      /* Inactive State */
      body.theme-ios .ios-btn-select {
        background-color: #1c1c1e;
        border: 1px solid #3a3a3c;
        color: #8e8e93;
        transition: all 0.3s ease;

      }
      /* Active State */
      body.theme-ios .ios-btn-select.active {
        background: linear-gradient(to right, var(--color-primary-from), var(--color-primary-to));
        border-color: transparent;
        color: white;
        box-shadow: 0 0 20px var(--shadow-color);
      }
      /* Checkmark Logic (Uses CSS pseudo-element for generic use, or explicit icon in React) */
      body.theme-ios .ios-btn-select .check-icon {
        display: none;
      }
      body.theme-ios .ios-btn-select.active .check-icon {
        display: block;
      }

      /* Night City Specifics */
      body.theme-night-city .rounded-xl,
      body.theme-night-city .rounded-lg,
      body.theme-night-city .rounded-2xl,
      body.theme-night-city button {
        border-radius: 4px !important;
      }
      
      /* Nature Specifics */
      body.theme-nature .rounded-xl,
      body.theme-nature .rounded-lg {
        border-radius: 16px;
      }

      /* --- Preloader Styles --- */
      #preloader {
        position: fixed;
        inset: 0;
        background-color: var(--bg-body);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

      /* Preloader Logo Styles */
      .preloader-logo {

        align-items: baseline;

      }
      .preloader-logo .accent {
        background: linear-gradient(to left, var(--color-primary-from), var(--color-primary-to));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }

      .dots-container {
        display: flex;
        gap: 16px;
        margin-top: 8px;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        /* UPDATED: Use CSS Variables so it adapts to the theme class on body */
        background: linear-gradient(to left, var(--color-primary-from), var(--color-primary-to));
        animation: pulse-dot 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      
      @keyframes pulse-dot {
        0%, 100% { transform: scale(0.7); opacity: 0.7; }
        50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 10px var(--shadow-color); }
      }

    <script>
      // Theme Persistence Script
      try {
        // Check activeTheme first, fallback to old key if not present
        const savedTheme = localStorage.getItem('cinematix_active_theme');
        const savedRamadan = localStorage.getItem('cinematix_theme_ramadan');
        
        // Determine theme to apply immediately
        let themeToApply = 'default';
        if (savedTheme) {
            themeToApply = savedTheme;
        } else if (savedRamadan === 'true') {
            themeToApply = 'ramadan';
        }

        // Apply theme class
        if (themeToApply === 'ramadan') {
          document.body.classList.add('theme-ramadan');
        } else if (themeToApply === 'ios') {
          document.body.classList.add('theme-ios');
        } else if (themeToApply === 'night-city') {
          document.body.classList.add('theme-night-city');
        } else if (themeToApply === 'nature') {
          document.body.classList.add('theme-nature');
        } else if (themeToApply === 'eid') {
          document.body.classList.add('theme-eid');
        } else if (themeToApply === 'cosmic-teal') {
          document.body.classList.add('theme-cosmic-teal');
        } else if (themeToApply === 'netflix-red') {
          document.body.classList.add('theme-netflix-red');
        }
        
        // Update Theme Color Meta Tag dynamically (if script runs, otherwise static meta tag below handles it)
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if(metaThemeColor) {
            // Force Black for all themes generally to look better on OLED/Notch phones
            metaThemeColor.setAttribute('content', '#000000');
        }

      } catch (e) {}
    </script>
