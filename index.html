    <style>
      /* Import Cairo Font */
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Lalezar&family=Tajawal:wght@400;500;700;800&display=swap');

      /* --- GLOBAL THEMING VARIABLES --- */
      :root {
        /* Default Theme (Cyber/Cool Blue) */
        --bg-body: #141b29;
        --color-primary-from: #00A7F8;
        --color-primary-to: #00FFB0;
        --color-accent: #00A7F8;
        --color-accent-hover: #00FFB0;
        --shadow-color: rgba(0, 167, 248, 0.4);
        --color-text-primary: #ffffff;
      }

      body.theme-ramadan {
        /* Ramadan Theme (Golden/Warm) */
        --bg-body: #000000; /* Black background as requested */
        --color-primary-from: #D4AF37; /* Metallic Gold */
        --color-primary-to: #F59E0B;   /* Amber */
        --color-accent: #FFD700;       /* Bright Gold */
        --color-accent-hover: #FDB931;
        --shadow-color: rgba(212, 175, 55, 0.4);
      }

      body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg-body);
        color: #fff;
        transition: background-color 0.5s ease;
        overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
      }

      /* Global overrides */
      body, h1, h2, h3, h4, h5, h6, p, span, div, a, button, input, select, textarea {
          font-family: 'Cairo', sans-serif !important;
      }

      /* --- THEME UTILITY CLASSES --- */
      
      /* Gradient Text */
      .gradient-text {
        background: linear-gradient(to left, var(--color-primary-from), var(--color-primary-to));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        transition: all 0.5s ease;
      }

      /* Primary Button (Gradient) */
      .btn-primary {
        background-image: linear-gradient(to right, var(--color-primary-from), var(--color-primary-to));
        color: black; /* Always black text on these bright gradients */
        transition: all 0.3s ease;
        border: none;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 20px var(--shadow-color);
        transform: scale(1.02);
      }

      /* Text Accent Hover */
      .hover-text-accent:hover {
        color: var(--color-accent);
        transition: color 0.3s ease;
      }

      /* Border Accent */
      .border-accent {
        border-color: var(--color-accent);
      }
      
      /* Ring Accent */
      .focus-ring-accent:focus {
        --tw-ring-color: var(--color-accent);
      }

      /* Scrollbar */
      .rtl-scroll::-webkit-scrollbar {
        display: none;
      }
      .rtl-scroll {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Custom Scrollbar for content areas */
      .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
          background-color: rgba(0,0,0,0.2);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background-color: rgba(255,255,255,0.2);
          border-radius: 10px;
      }

      /* Animations */
      @keyframes fadeInUp {
          from { opacity: 0; transform: translate3d(0, 40px, 0); }
          to { opacity: 1; transform: translate3d(0, 0, 0); }
      }
      .animate-fade-in-up {
          animation: fadeInUp 0.5s ease-out forwards;
      }
      
      @keyframes slideInTop {
          from { opacity: 0; transform: translate3d(-50%, -20px, 0); }
          to { opacity: 1; transform: translate3d(-50%, 0, 0); }
      }
      .animate-slide-in-top {
          animation: slideInTop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      
      @keyframes shine {
          0% { left: -100%; }
          100% { left: 100%; }
      }
      .animate-shine {
          animation: shine 2s infinite linear;
      }

      /* --- Preloader Styles --- */
      #preloader {
        position: fixed;
        inset: 0;
        background-color: var(--bg-body);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease-in-out;
        gap: 24px;
      }
      #preloader.preloader-hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      /* Preloader Logo Styles */
      .preloader-logo {
        font-size: 48px;
        font-weight: 900;
        font-family: 'Lalezar', sans-serif;
        letter-spacing: 1px;
        color: white;
      }
      .preloader-logo .accent {
        background: linear-gradient(to left, var(--color-primary-from), var(--color-primary-to));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
      }

      .dots-container {
        display: flex;
        gap: 16px;
      }
      .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        /* UPDATED: Use CSS Variables so it adapts to the theme class on body */
        background: linear-gradient(to left, var(--color-primary-from), var(--color-primary-to));
        animation: pulse-dot 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse-dot {
        0%, 100% { transform: scale(0.8); }
        50% { transform: scale(1.2); }
      }
      
      /* Safe area for mobile nav */
      .pb-safe {
          padding-bottom: env(safe-area-inset-bottom);
      }
    </style>

  <body>
    <script>
      // Theme Persistence Script
      // Checks localStorage immediately to prevent flash of unstyled/wrong-themed content
      try {
        const isRamadan = localStorage.getItem('cinematix_theme_ramadan') === 'true';
        if (isRamadan) {
          document.body.classList.add('theme-ramadan');
          // Update theme color meta for mobile browser chrome
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if(metaThemeColor) metaThemeColor.setAttribute('content', '#000000');
        }
      } catch (e) {}
    </script>
    <div id="preloader">
      <div class="preloader-logo">
        <span>سينما</span><span class="accent">تيكس</span>
      </div>
      <div class="dots-container">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
